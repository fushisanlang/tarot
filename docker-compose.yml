version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: tarot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: tarot
      MYSQL_USER: tarot
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - tarot-mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: unless-stopped
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: tarot-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: tarot-backend
    container_name: tarot-backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: tarot
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: tarot
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      FLASK_PORT: 5002
      FLASK_HOST: "0.0.0.0"
      FLASK_DEBUG: "false"
    ports:
      - "5002:5002"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tarot-mysql-data:
